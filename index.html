<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 | Portal Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .top-bar {
            background-color: #ffffff;
            font-size: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
            padding: 8px 0;
            letter-spacing: 0.5px;
        }
        .top-bar a {
            color: #111111;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }
        .top-bar a:hover { color: #0052cc; }

        .navbar {
            background-color: #ffffff !important;
            padding: 20px 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #000000 !important;
        }
        .nav-link {
            color: #000000 !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-left: 25px;
            transition: color 0.3s;
        }
        .nav-link:hover {
            color: #0052cc !important;
        }

        .hero-split {
            display: flex;
            height: calc(100vh - 120px);
            min-height: 550px;
            width: 100vw;
            overflow: hidden;
        }
        
        .split-side {
            flex: 1;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 60px;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .split-side::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 10%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
            transition: opacity 0.5s;
        }

        .split-content {
            position: relative;
            z-index: 2;
            transform: translateY(0);
            transition: transform 0.5s;
        }

        .split-side h2 {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .split-side p {
            font-size: 1.1rem;
            opacity: 0.85;
            max-width: 450px;
            margin-bottom: 0;
        }

        .split-side:hover {
            flex: 1.15;
        }
        .split-side:hover::before {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, rgba(0,0,0,0.1) 100%);
        }

        .left-side {
            background-image: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1200');
        }
        .right-side {
            background-image: url('https://images.unsplash.com/photo-1518091043644-c1d4457512c6?auto=format&fit=crop&q=80&w=1200');
        }

        @media (max-width: 991px) {
            .hero-split {
                flex-direction: column;
                height: auto;
            }
            .split-side {
                height: 50vh;
                padding: 30px;
            }
            .split-side h2 { font-size: 2rem; }
            .split-side:hover { flex: 1; }
        }
    </style>
</head>
